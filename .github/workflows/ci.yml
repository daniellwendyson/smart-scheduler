name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-quality:
    name: Backend quality checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16.0-alpine3.18
        env:
          POSTGRES_USER: local_user
          POSTGRES_PASSWORD: local_password
          POSTGRES_DB: smart_scheduler_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U local_user -d smart_scheduler_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: local_user
      POSTGRES_DB: smart_scheduler_test
      POSTGRES_PASSWORD: local_password
      DATABASE_URL: postgres://local_user:local_password@localhost:5432/smart_scheduler_test
      PORT: 3001

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run migrations
        run: npm run migrations:up:test

      - name: Run tests
        run: npm run test:ci

      - name: Build frontend
        run: npm run build
